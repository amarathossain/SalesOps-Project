{% extends 'base.html' %} {% block content %}
<div class="container-fluid">
    <div class="card shadow mb-4">
        <div class="card-header py-3 d-flex justify-content-between align-items-center">
            <h6 class="m-0 font-weight-bold text-primary">Division Name List</h6>
            <a href="{% url 'division_create' %}" class="btn btn-primary btn-sm">Add New Division</a>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-bordered">
                    <thead class="thead-dark">
                        <tr>
                            <th>Division Name</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for division in divisions %}
                        <tr>
                            <td>{{ division.name }}</td>
                            <td>
                                <a href="{% url 'division_update' division.pk %}" class="btn btn-warning btn-sm">Edit</a>
                                <a href="{% url 'division_delete' division.pk %}" class="btn btn-danger btn-sm">Delete</a>
                            </td>
                        </tr>
                        {% empty %}
                        <tr>
                            <td colspan="2" class="text-center">No divisions found.</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}
