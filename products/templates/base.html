<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SalesOps Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
        .sidebar { height: 100vh; width: 250px; position: fixed; background: #2c3e50; color: white; padding-top: 20px; }
        .sidebar a { padding: 15px; text-decoration: none; color: #ecf0f1; display: block; cursor: pointer; border-bottom: 1px solid #34495e; }
        .sidebar a:hover { background: #34495e; color: #3498db; }
        .content { margin-left: 250px; padding: 20px; width: calc(100% - 250px); background: #f8f9fa; min-height: 100vh; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h3 class="text-center mb-4">SalesOps</h3>
        <a href="javascript:void(0);" hx-get="/product-content/" hx-target="#main-content">📦 Product List</a>
        <a href="javascript:void(0);" hx-get="/user-content/" hx-target="#main-content">👥 User List</a>
        <hr>
        <a href="/admin/">⚙️ Admin Panel</a>
    </div>

    <div class="content" id="main-content">
        {% block content %}
            {% include 'product_table.html' %}
        {% endblock %}
    </div>

</body>
</html>
