<div class="card shadow-sm border-0 p-4">
    <h4 class="mb-3 text-primary">🛤️ Route List</h4>
    <table class="table table-hover align-middle">
        <thead class="table-dark">
            <tr>
                <th>Route Name</th>
                <th>Under Area</th>
            </tr>
        </thead>
        <tbody>
            {% for r in routes %}
            <tr>
                <td><strong>{{ r.name }}</strong></td>
                <td>{{ r.area.name }}</td>
            </tr>
            {% empty %}
            <tr><td colspan="2" class="text-center">কোন রুট পাওয়া যায়নি।</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>
