<div class="card shadow-sm border-0 p-4">
    <h4 class="mb-3 text-primary">📍 Zone List</h4>
    <table class="table table-hover align-middle">
        <thead class="table-dark">
            <tr>
                <th>Zone Name</th>
                <th>Under Division</th>
            </tr>
        </thead>
        <tbody>
            {% for z in zones %}
            <tr>
                <td><strong>{{ z.name }}</strong></td>
                <td><span class="badge bg-info text-dark">{{ z.division.name }}</span></td>
            </tr>
            {% empty %}
            <tr><td colspan="2" class="text-center">কোন জোন পাওয়া যায়নি।</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>
