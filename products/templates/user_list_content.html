<div class="card shadow-sm border-0">
    <div class="card-body">
        <h4 class="mb-4">Registered Users</h4>
        <div class="table-responsive">
            <table class="table table-hover">
                <thead class="table-light">
                    <tr>
                        <th>Username</th>
                        <th>Email</th>
                        <th>Staff Status</th>
                        <th>Date Joined</th>
                    </tr>
                </thead>
                <tbody>
                    {% for user in users %}
                    <tr>
                        <td><strong>{{ user.username }}</strong></td>
                        <td>{{ user.email }}</td>
                        <td>
                            {% if user.is_staff %}
                                <span class="badge bg-success">Admin/Staff</span>
                            {% else %}
                                <span class="badge bg-secondary">General User</span>
                            {% endif %}
                        </td>
                        <td>{{ user.date_joined|date:"d M Y" }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
