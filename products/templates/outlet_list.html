
<div class="card shadow-sm border-0 p-4">
    <h4 class="mb-3 text-primary">🏪 Outlet List</h4>
    <table class="table table-hover align-middle">
        <thead class="table-dark">
            <tr>
                <th>Outlet Name</th>
                <th>Route</th>
                <th>Address</th>
            </tr>
        </thead>
        <tbody>
            {% for o in outlets %}
            <tr>
                <td><strong>{{ o.name }}</strong></td>
                <td>{{ o.route.name }}</td>
                <td>{{ o.address }}</td>
            </tr>
            {% empty %}
            <tr><td colspan="3" class="text-center">কোন আউটলেট পাওয়া যায়নি।</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>
