<div class="card shadow-sm border-0 p-4">
    <h4 class="mb-3 text-primary">🏢 Division List</h4>
    <table class="table table-hover align-middle">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Division Name</th>
            </tr>
        </thead>
        <tbody>
            {% for d in divisions %}
            <tr>
                <td>{{ d.id }}</td>
                <td><strong>{{ d.name }}</strong></td>
            </tr>
            {% empty %}
            <tr><td colspan="2" class="text-center">কোন ডিভিশন পাওয়া যায়নি।</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>
